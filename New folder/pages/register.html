<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Store | Register</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-wrap">
      <a href="../index.html" class="logo">Nova Store</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="active">Login</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Create Account</h1>
      <p>Register with a short form to keep the project simple.</p>
    </section>

    <section class="form-box">
      <form>
        <div>
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name">
        </div>
        <div>
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="Enter your email">
        </div>
        <div>
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password">
        </div>
        <a href="profile.html" class="btn">Register</a>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>&copy; 2026 Nova Store. All rights reserved.</p>
      <p><a href="login.html">Back to Login</a></p>
    </div>
  </footer>
</body>
</html>
