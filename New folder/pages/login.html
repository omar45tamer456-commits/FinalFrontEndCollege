<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Store | Login</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-wrap">
      <a href="../index.html" class="logo">Nova Store</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="active">Login</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Login</h1>
      <p>Sign in to manage orders and profile details.</p>
    </section>

    <section class="form-box">
      <form>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
        </div>
        <a href="profile.html" class="btn">Login</a>
        <p class="muted">New here? <a href="register.html">Create an account</a></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>&copy; 2026 Nova Store. All rights reserved.</p>
      <p><a href="register.html">Register</a></p>
    </div>
  </footer>
</body>
</html>
