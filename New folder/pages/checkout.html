<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Store | Checkout</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-wrap">
      <a href="../index.html" class="logo">Nova Store</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html" class="active">Cart</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Checkout</h1>
      <p>Simple form layout for shipping and payment details.</p>
    </section>

    <section class="split">
      <div class="form-box">
        <!-- Checkout form -->
        <form>
          <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
          </div>
          <div>
            <label for="address">Address</label>
            <input type="text" id="address" placeholder="Enter your address">
          </div>
          <div>
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter your city">
          </div>
          <div>
            <label for="payment">Payment Method</label>
            <select id="payment">
              <option>Cash on Delivery</option>
              <option>Credit Card</option>
            </select>
          </div>
          <a href="orders.html" class="btn">Place Order</a>
        </form>
      </div>

      <aside class="content-block">
        <h2>Summary</h2>
        <div class="summary-box">
          <p><span>Items</span><span>3</span></p>
          <p><span>Shipping</span><span>$10</span></p>
          <p><span>Total</span><span>$125</span></p>
        </div>
      </aside>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>&copy; 2026 Nova Store. All rights reserved.</p>
      <p><a href="cart.html">Back to Cart</a></p>
    </div>
  </footer>
</body>
</html>
