<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Store | Contact</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-wrap">
      <a href="../index.html" class="logo">Nova Store</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="login.html">Login</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Contact Us</h1>
      <p>Use this simple contact page for customer support details and message form.</p>
    </section>

    <section class="split">
      <div class="form-box">
        <form>
          <div>
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" placeholder="Enter your name">
          </div>
          <div>
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" placeholder="Enter your email">
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your message"></textarea>
          </div>
          <a href="contact.html" class="btn">Send Message</a>
        </form>
      </div>

      <div class="contact-grid">
        <div class="content-block">
          <h3>Email</h3>
          <p class="muted">support@novastore.com</p>
        </div>
        <div class="content-block">
          <h3>Phone</h3>
          <p class="muted">+20 100 000 0000</p>
        </div>
        <div class="content-block">
          <h3>Location</h3>
          <p class="muted">Cairo, Egypt</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>&copy; 2026 Nova Store. All rights reserved.</p>
      <p><a href="about.html">About Us</a></p>
    </div>
  </footer>
</body>
</html>
